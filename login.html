<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgriPool</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fa-solid fa-seedling"></i>
                <h1>AgriPool</h1>
                <p>Welcome back, Farmer! 🌱</p>
                <div id="error-msg"
                    style="color: #d32f2f; margin-top: 15px; font-weight: 500; font-size: 0.95rem; display: none;">
                    Invalid credentials, please register first</div>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password"
                        required>
                </div>
                <button type="submit" class="btn" id="login-btn">Login</button>
            </form>
            <div class="auth-footer">
                <p>New to AgriPool? <a href="register.html">Create an Account</a></p>
            </div>
        </div>
    </div>

    <!-- Firebase Auth Logic -->
    <script type="module">

        import { initAuth } from './js/auth.js';
        import { loginUser } from './js/auth.js';

        // Redirect to index.html if already logged in
        initAuth(false, true);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');

            btn.textContent = 'Logging in...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                await loginUser(); // 🔥 use your function

            } catch (error) {
                console.error(error);
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Invalid credentials, please register first';
                btn.textContent = 'Login';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
