<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AgriPool</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fa-solid fa-tractor"></i>
                <h1>Join AgriPool</h1>
                <p>Start your farming journey with us 🌱</p>
                <div id="error-msg" style="color: #d32f2f; margin-top: 15px; font-weight: 500; font-size: 0.95rem; display: none;">Error registering</div>
            </div>
            <form id="register-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create a password (min 6 chars)" minlength="6" required>
                </div>
                <button type="submit" class="btn" id="register-btn">Register</button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </div>
    </div>

    <!-- Firebase Auth Logic -->
    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('register-btn');
            const errorMsg = document.getElementById('error-msg');
            
            btn.textContent = 'Registering...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                try {
                    // Try to save user data to Firestore
                    await setDoc(doc(db, "users", user.uid), {
                        name: name,
                        email: email,
                        role: 'farmer',
                        createdAt: new Date().toISOString()
                    });
                } catch(e) {
                    console.log("Mocking registration DB save error", e);
                }

                alert('Registration successful! Redirecting to login.');
                // After register, redirect to login page by signing out freshly
                await auth.signOut();
                window.location.href = 'login.html';
                
            } catch (error) {
                console.error(error);
                errorMsg.style.display = 'block';
                errorMsg.textContent = error.message.replace('Firebase: ', '');
                btn.textContent = 'Register';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
