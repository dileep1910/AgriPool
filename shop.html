<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - AgriPool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .filter-group label { margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <i class="fa-solid fa-wheat-awn"></i> AgriPool
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html" class="active">Shop</a></li>
            <li><a href="transport.html">Transport</a></li>
        </ul>
        <div class="nav-actions">
            <a href="cart.html" class="cart-icon">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-count">0</span>
            </a>
            <a href="login.html" class="btn" id="nav-login-btn" style="padding: 8px 15px; font-size: 1rem;">Login <i class="fa-solid fa-arrow-right-to-bracket"></i></a>
            
            <div class="profile-container">
                <div id="profile-btn" style="display: none;"></div>
                <div class="profile-dropdown" id="profile-dropdown">
                    <div class="dropdown-header">
                        <h4 id="dropdown-name">User</h4>
                        <p id="dropdown-email">user@example.com</p>
                    </div>
                    <ul class="dropdown-menu">
                        <li><a href="activity.html"><i class="fa-solid fa-chart-line"></i> My Activity</a></li>
                        <li><a href="orders.html"><i class="fa-solid fa-box"></i> My Orders</a></li>
                        <li><a href="track.html"><i class="fa-solid fa-location-dot"></i> Track Order</a></li>
                        <li><a href="#" onclick="logoutUser()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
        <button class="mobile-menu-btn">
            <i class="fa-solid fa-bars"></i>
        </button>
    </nav>

    <header class="page-header">
        <h1>Farm Supply Shop</h1>
        <p>Buy premium fertilizers, seeds, and tools at the best prices.</p>
    </header>

    <div class="shop-container">
        <!-- Sidebar Filters -->
        <aside class="filters">
            <h3>Categories</h3>
            <div class="filter-group">
                <label><input type="radio" name="category" value="all" checked> All Products</label>
                <label><input type="radio" name="category" value="seed"> Seeds</label>
                <label><input type="radio" name="category" value="fertilizer"> Fertilizers</label>
                <label><input type="radio" name="category" value="tool"> Farming Tools</label>
            </div>
        </aside>

        <!-- Dynamic Products List -->
        <main class="products-grid" id="products-grid">
            <!-- Populated by shop.js -->
        </main>
    </div>

    <footer>
        <div class="logo" style="color: white; justify-content: center; margin-bottom: 20px;">
            <i class="fa-solid fa-wheat-awn"></i> AgriPool
        </div>
        <p>&copy; 2026 AgriPool. Designed for Farmers.</p>
    </footer>

    <script type="module" src="js/shop.js"></script>
</body>
</html>
