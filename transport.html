<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Transport</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<div class="transport-container">
<div class="booking-section">
<div class="booking-form">

<h2>Book Transport</h2>

<form id="transport-form">

<label>Pickup Point</label>
<input type="text" id="pickup" class="form-control">
<div id="pickup-suggestions" class="suggestions-box"></div>

<label>Drop Point</label>
<input type="text" id="dropoff" class="form-control">
<div id="dropoff-suggestions" class="suggestions-box"></div>

<label>Goods</label>
<select class="form-control">
<option>Crops</option>
<option>Vegetables</option>
<option>Fruits</option>
<option>Cotton</option>
<option>Flowers</option>
</select>

<div class="vehicle-options">

<label class="vehicle-card">
<input type="radio" name="vehicle" value="truck" hidden>
<i class="fa-solid fa-truck"></i>
<h4>Truck</h4>
</label>

<label class="vehicle-card">
<input type="radio" name="vehicle" value="mini" hidden>
<i class="fa-solid fa-truck"></i>
<h4>Mini</h4>
</label>

<label class="vehicle-card">
<input type="radio" name="vehicle" value="tractor" hidden>
<i class="fa-solid fa-tractor"></i>
<h4>Tractor</h4>
</label>

</div>

<button type="submit" class="btn">Calculate</button>

<div id="result-box" class="result-box"></div>

<button type="button" id="confirm-booking-btn" class="btn btn-secondary" style="display:none;">
Confirm Booking
</button>

</form>

</div>
</div>
</div>

<script type="module" src="js/transport.js"></script>

</body>
</html>
